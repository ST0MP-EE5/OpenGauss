name = "OpenGaussLean4"
version = "0.1.0"
keywords = ["math", "opengauss"]
defaultTargets = ["OpenGaussLean4"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "OpenGaussLean4"

